---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: roclub-pki
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: roclub-pki
spec:
  isCA: true
  commonName: roclub-selfsigned-ca
  secretName: root-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: roclub-pki
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: redis-server-tls-ca
spec:
  ca:
    secretName: root-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: redis-server-tls
spec:
  secretName: redis-server-tls

  privateKey:
    algorithm: ECDSA
    encoding: PKCS1
    size: 256

  signatureAlgorithm: ECDSAWithSHA256

  duration: 2160h # 90d
  renewBefore: 360h # 15d

  isCA: false
  usages:
    - server auth
    - client auth

  subject:
    organizations:
      - cert-manager

  # SANs for the Redis server certificate. Must include every hostname
  # the app dials Redis through, otherwise Node TLS rejects the cert
  # with ERR_TLS_CERT_ALTNAME_INVALID. The app uses the
  # <release>-redis-headless service (see deployment.yaml -> REDIS_HOST);
  # we also list the FQDN and master/replicas names so future config
  # changes don't require reissuing the cert.
  dnsNames:
    - {{ .Release.Name }}-redis-headless
    - {{ .Release.Name }}-redis-headless.{{ .Release.Namespace }}.svc.cluster.local
    - {{ .Release.Name }}-redis-master
    - {{ .Release.Name }}-redis-master.{{ .Release.Namespace }}.svc.cluster.local
    - {{ .Release.Name }}-redis-replicas
    - {{ .Release.Name }}-redis-replicas.{{ .Release.Namespace }}.svc.cluster.local

  issuerRef:
    name: redis-server-tls-ca
    kind: Issuer
