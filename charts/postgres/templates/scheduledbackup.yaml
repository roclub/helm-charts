{{- if and .Values.objectStore.enabled .Values.scheduledBackup.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "postgres.scheduledBackupName" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
  {{- include "postgres.namespace" . | nindent 2 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: {{ include "postgres.clusterName" . }}
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
{{- end }}
