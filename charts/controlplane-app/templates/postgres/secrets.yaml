apiVersion: v1
kind: Secret
metadata:
  name: {{ include "controlplane-app.fullname" . }}-postgres-backup-creds
  labels:
    cnpg.io/reload: "true"
    {{- include "controlplane-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
data:
  ACCESS_KEY_ID: {{ .Values.postgres.secrets.backupCredentials.accessKeyId | b64enc }}
  ACCESS_SECRET_KEY: {{ .Values.postgres.secrets.backupCredentials.secretAccessKey | b64enc }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: {{ include "controlplane-app.fullname" . }}-pg-superuser
  labels:
    cnpg.io/reload: "true"
    {{- include "controlplane-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  username: {{ .Values.postgres.users.superuser | b64enc }}
  password: {{ .Values.postgres.secrets.superuser.password }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: {{ include "controlplane-app.fullname" . }}-pg-runtime
  labels:
    cnpg.io/reload: "true"
    {{- include "controlplane-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  username: {{ .Values.postgres.users.runtime | b64enc }}
  password: {{ .Values.postgres.secrets.users.runtime.password }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: {{ include "controlplane-app.fullname" . }}-pg-migration
  labels:
    cnpg.io/reload: "true"
    {{- include "controlplane-app.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  username: {{ .Values.postgres.users.migration | b64enc }}
  password: {{ .Values.postgres.secrets.users.migration.password }}
