apiVersion: v1
kind: Secret
metadata:
  name: {{ include "controlplane-app.fullname" . }}-postgres-backup-creds
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
data:
  ACCESS_KEY_ID: {{ .Values.postgres.secrets.backupCredentials.accessKeyId | quote }}
  ACCESS_SECRET_KEY: {{ .Values.postgres.secrets.backupCredentials.secretAccessKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "controlplane-app.fullname" . }}-pg-superuser
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: kubernetes.io/basic-auth
data:
  username: cG9zdGdyZXM=
  password: {{ .Values.postgres.secrets.superuser.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "controlplane-app.fullname" . }}-pg-runtime
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: kubernetes.io/basic-auth
data:
  username: {{ .Values.postgres.users.runtime | b64enc | quote }}
  password: {{ .Values.postgres.secrets.users.runtime.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "controlplane-app.fullname" . }}-pg-migration
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: kubernetes.io/basic-auth
data:
  username: {{ .Values.postgres.users.migration | b64enc | quote }}
  password: {{ .Values.postgres.secrets.users.migration.password | quote }}
