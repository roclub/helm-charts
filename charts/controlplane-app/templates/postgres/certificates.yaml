apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "controlplane-app.fullname" . }}-selfsigned-issuer
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  selfSigned: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "controlplane-app.fullname" . }}-postgres-cert
  labels:
    cnpg.io/reload: ""
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "controlplane-app.fullname" . }}-postgres-cert
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: {{ include "controlplane-app.fullname" . }}-postgres-cert
  usages:
    - server auth
  dnsNames:
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-rw
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-rw.controlplane-app
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-rw.controlplane-app.svc
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-r
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-r.controlplane-app
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-r.controlplane-app.svc
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-ro
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-ro.controlplane-app
    - {{ include "controlplane-app.fullname" . }}-postgres-cluster-ro.controlplane-app.svc
  issuerRef:
    name: {{ include "controlplane-app.fullname" . }}-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
