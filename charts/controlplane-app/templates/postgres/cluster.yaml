apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "controlplane-app.fullname" . }}-postgres-cluster
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  instances: {{ .Values.postgres.cluster.instances }}
  description: "controlplane-app Postgres Cluster"
  imageName: ghcr.io/cloudnative-pg/postgresql:16.0
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: {{ include "controlplane-app.fullname" . }}-pg-superuser

  bootstrap:
     initdb:
       database: controlplane_app
       owner: {{ .Values.postgres.users.migration }}
       secret:
         name: {{ include "controlplane-app.fullname" . }}-pg-superuser
       postInitSQL:
         - GRANT CONNECT ON DATABASE controlplane_app TO "{{ .Values.postgres.users.runtime }}";
         - GRANT USAGE ON SCHEMA public TO "{{ .Values.postgres.users.runtime }}";
         - GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO "{{ .Values.postgres.users.runtime }}";
         - GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA public TO "{{ .Values.postgres.users.runtime }}";
         - ALTER DEFAULT PRIVILEGES FOR ROLE "{{ .Values.postgres.users.migration }}" IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO "{{ .Values.postgres.users.runtime }}";
         - ALTER DEFAULT PRIVILEGES FOR ROLE "{{ .Values.postgres.users.migration }}" IN SCHEMA public GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO "{{ .Values.postgres.users.runtime }}";


  managed:
    roles:
      - name: {{ .Values.postgres.users.runtime }}
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: {{ include "controlplane-app.fullname" . }}-pg-runtime
      - name: {{ .Values.postgres.users.migration }}
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: {{ include "controlplane-app.fullname" . }}-pg-migration

  storage:
    storageClass: aws-gp3-daily-backup
    size: {{ .Values.postgres.cluster.storage.size }}

  certificates:
    serverTLSSecret: {{ include "controlplane-app.fullname" . }}-postgres-cert
    serverCASecret: {{ include "controlplane-app.fullname" . }}-postgres-cert

  resources:
    {{- toYaml .Values.postgres.cluster.resources | nindent 4 }}

  affinity:
    {{- toYaml .Values.postgres.cluster.affinity | nindent 4 }}

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: aws-s3-{{ include "controlplane-app.fullname" . }}-postgres-backup
