apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ include "controlplane-app.fullname" . }}-daily-backup
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
  namespace: controlplane-app
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: {{ include "controlplane-app.fullname" . }}-postgres-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
