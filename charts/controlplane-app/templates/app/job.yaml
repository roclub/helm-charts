apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "controlplane-app.fullname" . }}-migration
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- with .Values.migration.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "controlplane-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: migration
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
          args:
            - -lc
            - |
              set -x
              echo "=== runtime ==="
              uname -a || true
              uname -m || true
              echo "=== backend binary ==="
              ls -l /usr/local/bin/backend || true
              od -An -tx1 -N64 /usr/local/bin/backend || true
              echo "=== config ==="
              ls -l /app/config.yaml || true
              echo "=== backend execution ==="
              /usr/local/bin/backend migrate up --config /app/config.yaml
          volumeMounts:
            - name: migration-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
      volumes:
        - name: migration-config
          configMap:
            name: {{ include "controlplane-app.fullname" . }}-migration-config
      nodeSelector:
        beta.kubernetes.io/arch: arm64
