{{/* TODO: Uncomment this migration Job after the initial release has created the PostgreSQL cluster. */}}
{{/*
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "controlplane-app.fullname" . }}-migration
  labels:
    {{- include "controlplane-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "controlplane-app.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: migration
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/backend
          args:
            - "--config"
            - "/app/config.yaml"
            - migrate
            - up
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "controlplane-app.fullname" . }}-pg-migration
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "controlplane-app.fullname" . }}-pg-migration
                  key: password
          volumeMounts:
            - name: migration-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
      volumes:
        - name: migration-config
          configMap:
            name: {{ include "controlplane-app.fullname" . }}-migration-config
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
*/}}
