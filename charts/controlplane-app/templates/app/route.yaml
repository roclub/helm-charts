---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "controlplane-app.fullname" . }}
  labels:
    authentication/zitadel: jwt
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.app.gatewayAPI.gatewayName }}
  hostnames:
  {{- range .Values.app.domainNames}}
    - {{ . }}
  {{- end }}
  rules:
  {{- range .Values.app.gatewayAPI.hosts }}
    - matches:
      {{- range $path := .paths }}
        {{- range $method := $path.methods }}
        - path:
            type: {{ $path.pathType }}
            value: {{ $path.path }}
          method: {{ $method }}
        {{- end }}
      {{- end }}
      backendRefs:
        - name: {{ include "controlplane-app.fullname" $ }}
          port: {{ $.Values.app.service.httpPort }}
  {{- end }}
