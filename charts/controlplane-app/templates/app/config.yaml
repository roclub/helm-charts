apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "controlplane-app.fullname" . }}-config"
  labels:
    {{- include "controlplane-app.selectorLabelsApp" . | nindent 4 }}
data:
  POSTGRES_URL: {{ .Values.config.postgresUrl | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ENV: {{ .Values.config.env | quote }}
