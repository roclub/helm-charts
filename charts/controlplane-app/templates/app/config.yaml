apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "controlplane-app.fullname" . }}
  labels:
    {{ include "controlplane-app.labels" . | nindent 4 }}
data:
  config.yaml: |
    dependencies:
      postgres:
        url: {{ .Values.app.config.postgresUrl }}
      calCom:
        apiKey: {{ .Values.app.config.calCom.apiKey }}
        apiVersion: {{ .Values.app.config.calCom.apiVersion }}
        baseURL: {{ .Values.app.config.calCom.baseURL }}
