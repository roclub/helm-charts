app:
  stage: "dev"

  image:
    repository: ghcr.io/roclub/controlplane-app

  imagePullSecrets:
    - name: dockerconfigjson-github-com

  config:
    postgresUrl: ""
    calCom:
      apiKey: ""
      apiVersion: "2024-08-13"
      baseURL: "https://api.cal.eu/v2"

  service:
    type: ClusterIP
    httpPort: 8081
    gRPCPort: 8080

  domainNames:
    - "controlplane.dev.roclub.io"

  gatewayAPI:
    gatewayName: "dev-controlplane"
    hosts:
      - paths:
          - path: /api/core/v1/
            pathType: PathPrefix
            methods: ["GET", "POST", "DELETE", "PATCH", "PUT", "OPTIONS"]

  securityPolicy:
    allowedOrigins:
      - "https://beta.dev.roclub.io"

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "400m"
      memory: "512Mi"

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1

  nodeSelector:
    kubernetes.io/arch: arm64

postgres:
  users:
    runtime: controlplane_app_runtime
    migration: controlplane_app_migration

  cluster:
    instances: 1
    storage:
      size: 50Gi
    resources:
      requests:
        cpu: ""
        memory: ""
      limits:
        cpu: ""
        memory: ""
    affinity: {}

  objectStore:
    destinationPath: ""

  secrets:
    backupCredentials:
      accessKeyId: ""
      secretAccessKey: ""
    superuser:
      password: ""
    users:
      runtime:
        password: ""
      migration:
        password: ""
