nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/roclub/controlplane-app
  pullPolicy: Always
  tag: ""

imagePullSecrets: 
  - name: dockerconfigjson-github-com

replicaCount: 1

config:
  postgresUrl: ""
  logLevel: ""
  env: ""

service:
  type: ClusterIP
  httpPort: 8081
  gRPCPort: 8080

domainNames: 
  - "controlplane.dev.roclub.io"

gatewayAPI:
  gatewayName: "dev-controlplane"
  hosts:
    - paths:
        - path: /v1/app/
          pathType: PathPrefix

securityPolicy:
  allowedOrigins:
    - "https://beta.dev.roclub.io"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "app-dev"

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []
affinity: {}
