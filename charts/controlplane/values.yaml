iotKafkaInterfaceCronjob:
  name: iot-kafka-interface-cronjob
  schedule: "*/15 * * * *" # Runs every 15 minutes
  serviceAccount:
    automount: true
    roleArn: arn:aws:iam::172771008158:role/EKSServiceAccountIotKafkaAttachInterfaceRole
  container:
    name: iot-kafka-interface-script-container
    image: ghcr.io/roclub/controlplane-connector-status-interface-script-image:latest
    imagePullPolicy: Always
  imagePullSecrets: dockerconfigjson-github-com
  restartPolicy: OnFailure

redis:
  architecture: "replication"
  auth:
    enabled: true
    sentinel: true
    password: ""
  rbac:
    create: true
  serviceAccount:
    create: true
    automountServiceAccountToken: true
  replica:
    replicaCount: 1
    automountServiceAccountToken: true
    persistence:
      enabled: true
      storageClass: "gp3"
      size: 10Gi
  sentinel:
    enabled: true
    service:
      createMaster: true
    masterService:
      enabled: true
  master:
    persistence:
      enabled: true
      storageClass: "gp3"
      size: 10Gi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  tls:
    enabled: true
    existingSecret: "controlplane-redis-tls"
    certFilename: "tls.crt"
    certKeyFilename: "tls.key"
    certCAFilename: "ca.crt"
    authClients: false
