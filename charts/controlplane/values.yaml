nameOverride: ""
fullnameOverride: ""

stage: "dev"
recordNames:
  - cp.dev.roclub.io123

authZ:
  service:
    name: ""
    nameByStage:
      dev: dev-controlplane-authz
      stg: stg-controlplane-authz
      prd: prd-controlplane-authz
    port: 8080

conferenceWebsocket:
  image:
    repository: ghcr.io/roclub/conference-websocket-development
    tag: 0.0.2
    pullPolicy: Always

  imagePullSecrets:
    - name: dockerconfigjson-github-com

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources: {}

  nodeSelector:
    beta.kubernetes.io/arch: arm64

  tolerations: []
  affinity: {}

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: "conference-websocket"

  gatewayAPI:
    hosts:
      - paths:
          - path: /v2/websocket/
            pathType: PathPrefix

  env:
    - name: TOKEN
      value: ""
    - name: ALLOWED_ORIGIN
      value: ""

remoteControl:
  image:
    repository: ghcr.io/roclub/controlplane-session-control
    pullPolicy: Always

  imagePullSecrets: 
    - name: dockerconfigjson-github-com

  replicaCount: 1

  config:
    env: "dev"
    serviceAccounts: []

    iotDataplane:
      key: ""
      secret: ""

    redis:
      enabled: false
      url: ""
      username: ""
      password: ""
      db: 0
      ttlSeconds: 300
      negativeTtlSeconds: 10
      timeoutMs: 2000
      maxRetries: 3

    liveKit:
      key: ""
      secret: ""
      host: ""
      ttl: 300

    logger: "debug"

  service:
    type: ClusterIP
    httpPort: 8081
    gRPCPort: 8080

  gatewayAPI:
    hosts:
      - paths:
          - path: /v2/sessions/
            pathType: PathPrefix

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: "remote-control"

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

  resources: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  volumeMounts: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

