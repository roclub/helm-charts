{{- if and .Values.provisioning.enabled .Values.provisioning.seedConfig }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "controlplane-authz.fullname" . }}-seed-config
  labels:
    {{- include "controlplane-authz.labels" . | nindent 4 }}
    {{- include "controlplane-authz.selectorLabelsAuthZ" . | nindent 4 }}
    app.kubernetes.io/component: openfga-seed
  {{- with .Values.provisioning.seedConfigMapAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  seed.toml: |-
{{ .Values.provisioning.seedConfig | nindent 4 }}
{{- end }}
