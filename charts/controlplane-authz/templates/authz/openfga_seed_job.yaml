{{- if .Values.provisioning.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "controlplane-authz.fullname" . }}-openfga-seed
  labels:
    {{- include "controlplane-authz.labels" . | nindent 4 }}
    app.kubernetes.io/component: openfga-seed
  {{- with .Values.provisioning.seedJobAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.provisioning.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.provisioning.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: openfga-seed
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "controlplane-authz.serviceAccountAuthZName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seed
          image: "{{ default .Values.image.repository .Values.provisioning.seedImage.repository }}:{{ default (default .Chart.AppVersion .Values.image.tag) .Values.provisioning.seedImage.tag }}"
          imagePullPolicy: {{ default .Values.image.pullPolicy .Values.provisioning.seedImage.pullPolicy }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              set -eu
              API_URL={{ .Values.config.openfga.url | quote }}
              STORE_ID={{ .Values.config.openfga.storeId | quote }}
              SEED_FILE=/seed/tuples.{{ .Values.provisioning.tuplesFileFormat }}

              /app/bin/controlplane-authz seed --config-dir /etc/seed
          volumeMounts:
            - name: config-volume
              mountPath: /etc/edged
              readOnly: true
          {{- if .Values.provisioning.seedConfig }}
            - name: seed-config-volume
              mountPath: /etc/seed
              readOnly: true
          {{- end }}
          {{- if or .Values.provisioning.tuplesFileContent .Values.provisioning.tuplesFilePath }}
            - name: seed-file
              mountPath: /seed
              readOnly: true
          {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: "{{ include "controlplane-authz.fullname" . }}-config"
            defaultMode: 0444
      {{- if .Values.provisioning.seedConfig }}
        - name: seed-config-volume
          configMap:
            name: {{ include "controlplane-authz.fullname" . }}-seed-config
            defaultMode: 0444
      {{- end }}
      {{- if or .Values.provisioning.tuplesFileContent .Values.provisioning.tuplesFilePath }}
        - name: seed-file
          configMap:
            name: {{ include "controlplane-authz.fullname" . }}-openfga-seed
            defaultMode: 0444
      {{- end }}
{{- end }}