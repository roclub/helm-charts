apiVersion: v1
kind: Service
metadata:
  name: {{ include "controlplane-authz.fullname" . }}
  labels:
    {{- include "controlplane-authz.labels" . | nindent 4 }}
  {{- with .Values.serviceAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.gRPCPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "controlplane-authz.selectorLabelsAuthZ" . | nindent 4 }}
