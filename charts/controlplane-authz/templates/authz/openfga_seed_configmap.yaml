{{- if .Values.provisioning.enabled }}
{{- $tuplesContent := .Values.provisioning.tuplesFileContent }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "controlplane-authz.fullname" . }}-openfga-seed
  labels:
    {{- include "controlplane-authz.labels" . | nindent 4 }}
    app.kubernetes.io/component: openfga-seed
  {{- with .Values.provisioning.seedConfigMapAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  tuples.yaml: |-
{{ $tuplesContent | nindent 4 }}
{{- end }}