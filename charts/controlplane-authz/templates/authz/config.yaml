apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "controlplane-authz.fullname" . }}-config"
  labels:
    {{- include "controlplane-authz.selectorLabelsAuthZ" . | nindent 4 }}
  {{- with .Values.configAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  config.toml: |-
    [authz]
    env = "{{ .Values.config.env }}"
    service_accounts = {{ .Values.config.serviceAccounts }}
    
    [authz.openfga]
    url = "{{ .Values.config.openfga.url }}"
    store_id = "{{ .Values.config.openfga.storeId }}"

    [authz.logger]
    level = "{{ .Values.config.logger }}"
  model.fga: |-
{{- .Values.provisioning.model | trim | nindent 4 }}
