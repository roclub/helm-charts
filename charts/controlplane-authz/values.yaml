nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/roclub/controlplane-authz
  pullPolicy: Always
  tag: ""

imagePullSecrets: 
  - name: dockerconfigjson-github-com

replicaCount: 1

config:
  env: "dev"
  serviceAccounts: []
  
  openfga:
    url: "http://openfga-dev.openfga.svc.cluster.local:8080"
    storeId: "01J7B5WBSF3VHP1D0S5JV5Q1JY"

  logger: "debug"

service:
  type: ClusterIP
  httpPort: 8081
  gRPCPort: 8080

domainNames: 
  - "controlplane.dev.roclub.io"

gatewayAPI:
  gatewayName: "dev-controlplane"
  hosts:
    - paths:
        - path: /v2/authz/
          pathType: PathPrefix

securityPolicy:
  allowedOrigins:
    - "https://conference.dev.roclub.io"
    - "https://beta.dev.roclub.io"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "authz-dev"

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []
affinity: {}

provisioning:
  image:
    repository: openfga/cli
    tag: "v0.7.15"
    pullPolicy: IfNotPresent
  model: |
    model
    schema 1.1

    type user

    type organization
        relations
            define member: [user]
            define admin: [user]

    type connector
        relations
            define parent: [organization]
            define local_operator: [user]
            define remote_operator: [user]
            define guest: [user]
            define admin: admin from parent

