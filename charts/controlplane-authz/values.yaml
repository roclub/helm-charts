nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/roclub/controlplane-authz
  pullPolicy: Always
  tag: ""

imagePullSecrets: 
  - name: dockerconfigjson-github-com

replicaCount: 1

config:
  env: "dev"
  serviceAccounts: []
  
  openfga:
    url: "http://openfga-dev.openfga.svc.cluster.local:8080"
    storeId: "01J7B5WBSF3VHP1D0S5JV5Q1JY"

  logger: "debug"

service:
  type: ClusterIP
  httpPort: 8081
  gRPCPort: 8080

domainNames: 
  - "controlplane.dev.roclub.io"

gatewayAPI:
  gatewayName: "dev-controlplane"
  hosts:
    - paths:
        - path: /v2/authz/
          pathType: PathPrefix

securityPolicy:
  allowedOrigins:
    - "https://conference.dev.roclub.io"
    - "https://beta.dev.roclub.io"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "authz-dev"

configAnnotations: {}
deploymentAnnotations: {}
serviceAnnotations: {}
routeAnnotations: {}
securityPolicyAnnotations: {}
hpaAnnotations: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []
affinity: {}

provisioning:
  enabled: false
  jobAnnotations: {}
  seedJobAnnotations: {}
  seedConfigMapAnnotations: {}
  backoffLimit: 1
  ttlSecondsAfterFinished: 60
  image:
    repository: openfga/cli
    tag: "v0.7.15"
    pullPolicy: IfNotPresent
  model: |
    model
    schema 1.1

    type user

    type platform
      relations
        define csm: [user]

    type organization
      relations
        define parent: [platform]
        define member: [user]
        define admin: [user] or csm from parent

    type connector
      relations
        define parent: [organization]
        define local_operator: [user] or admin from parent
        define remote_operator: [user] or admin from parent
        define guest: [user]
        define admin: admin from parent

  # If set, loads tuple data from a file packaged in this chart (e.g. seeds/seed.yaml).
  tuplesFilePath: ""
  # Preferred for GitOps overlays and environment-specific seeds.
  # Set this in the GitOps values file to avoid chart changes per environment.
  tuplesFileContent: ""
  # Seed configuration passed to the OpenFGA seed Job (ConfigMap seed.toml).
  # Set this in GitOps to provide environment-specific seed configuration.
  seedConfig: |
    [seed.openfga]
    url = "{{ .Values.config.openfga.url }}"
    store_id = "{{ .Values.config.openfga.storeId }}"

