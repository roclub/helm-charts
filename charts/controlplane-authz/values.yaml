nameOverride: ""
fullnameOverride: ""

authZ:
  image:
    repository: ghcr.io/roclub/controlplane-authz
    pullPolicy: Always

  imagePullSecrets: 
    - name: dockerconfigjson-github-com

  replicaCount: 1

  config:
    env: "dev"
    serviceAccounts: []
    
    openfga:
      url: "http://openfga-dev.openfga.svc.cluster.local:8080"
      storeId: "01J7B5WBSF3VHP1D0S5JV5Q1JY"
      modelId: "01J7BE0N8AQ9XST88B4XXT7KJT"

    logger: "debug"

  service:
    type: ClusterIP
    httpPort: 8081
    gRPCPort: 8080

  gatewayAPI:
    hosts:
      - paths:
          - path: /v2/authz/
            pathType: PathPrefix

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: "authz"

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}

  resources: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  volumeMounts: []

  nodeSelector: {}

  tolerations: []
  affinity: {}

