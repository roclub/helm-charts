name: "\U0001F527 Bug Report"
description: Create an issue for a bug report.
labels: ["triage/needed"]
type: bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description. Include firmware/software version if not on the latest release.
      placeholder: Insert here...
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      value: "1. \n2. \n3. "
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: A clear and concise description of what you expected to happen
      placeholder: Insert here...
    validations:
      required: true
  - type: textarea
    id: actual-behaviour
    attributes:
      label: Actual behaviour
      description: A clear and concise description of what actually happens
      placeholder: Insert here...
    validations:
      required: true
  - type: textarea
    id: hubspot-tickets
    attributes:
      label: HubSpot Customer Tickets
      description: Link any related HubSpot customer tickets here.
      placeholder: "- [Ticket #12345](https://app.hubspot.com/contacts/...)"
    validations:
      required: false
  - type: textarea
    id: grafana-links
    attributes:
      label: Grafana Links
      description: Link relevant Grafana dashboards, log queries, or metric panels that help verify or investigate this bug.
      placeholder: "- [Logs](https://grafana.../explore?...)\n- [Metrics](https://grafana.../d/...)"
    validations:
      required: false
  - type: dropdown
    id: severity-classification
    attributes:
      label: Severity classification
      description: Indicates if the bug causes or changes risks to patients. See [risk database](https://www.notion.so/roclub/01552c2bd23c4267a3e29a41780692c6?v=092725438261472eb711d26305a6e948)
      options:
        - low - No change to risks
        - medium - May cause new or changed risks to patients which are acceptable
        - high - Causes new or changed risks to patients which are unacceptable
      default: 0
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Insert here...
    validations:
      required: false
